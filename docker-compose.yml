services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xmonitor
      POSTGRES_USER: xmonitor
      POSTGRES_PASSWORD: xmonitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmonitor -d xmonitor"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    command: ["/app/migrate", "/app/migrations"]
    environment:
      DATABASE_URL: postgres://xmonitor:xmonitor@db:5432/xmonitor?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
